# Prometheus configuration for Starhaven homelab
# Deploy on: 192.168.0.248 (lxc/105)
# Config path: /etc/prometheus/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    site: 'starhaven'

# Alertmanager (optional — uncomment if you have one)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['localhost:9093']

# Rule files (optional)
# rule_files:
#   - /etc/prometheus/rules/*.yml

scrape_configs:

# ── Standard Debian node_exporter (port 9100) ──────────────────────────────
# Provides: CPU, RAM, network, disk I/O, filesystem (NVMe only), ZFS ARC,
#           hwmon sensors, apt_upgrades_pending, netstat, systemd
# NOTE: Does NOT include /mnt/bckpHDD or ZFS pool capacity
- job_name: 'node_exporter'
  scrape_interval: 15s
  static_configs:
  - targets:
    - '192.168.0.222:9100'
    labels:
      host: 'pve'
      role: 'hypervisor'

# ── Custom Proxmox node exporter (port 9101) ───────────────────────────────
# Provides: ZFS pool capacity, /mnt/bckpHDD, PVE VM/LXC status,
#           SMART data, Dell SMM sensors (fan RPM + temps)
# Script: /opt/proxmox-exporter/proxmox-node-exporter.py
- job_name: 'proxmox_node_exporter'
  scrape_interval: 30s
  scrape_timeout: 25s
  static_configs:
  - targets:
    - '192.168.0.222:9101'
    labels:
      host: 'pve'
      role: 'hypervisor'

# ── pve_exporter (port 9221, runs in lxc/108) ─────────────────────────────
# Provides: Proxmox cluster/node/VM/storage metrics via PVE API
# https://github.com/prometheus-pve/prometheus-pve-exporter
# NOTE: Currently returning 500 errors — investigate pve_exporter config
- job_name: 'proxmox'
  metrics_path: /pve
  scrape_interval: 30s
  params:
    target: [ '192.168.0.222:8006' ]
  static_configs:
  - targets:
    - '192.168.0.246:9221'
    labels:
      host: 'pve'
      role: 'hypervisor'

# ── Prometheus self-monitoring ─────────────────────────────────────────────
- job_name: 'prometheus'
  scrape_interval: 30s
  static_configs:
  - targets:
    - 'localhost:9090'
    labels:
      host: 'prometheus-lxc'
      role: 'monitoring'
# ── Grafana self-monitoring (optional) ─────────────────────────────────────
# Enable /metrics in grafana.ini: [metrics] enabled = true
